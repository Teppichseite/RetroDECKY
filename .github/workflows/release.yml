name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "dev"
    tags:
      - "v*.*.*"

jobs:
  build_plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup latest Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Setup PNPM@10
        uses: pnpm/action-setup@v4
        with:
          version: "10.11.0"

      - name: Build frontend from source
        run: |
          pnpm i
          pnpm run build
        continue-on-error: true

      - name: Download Decky Plugin CLI
        run: |
          mkdir $(pwd)/cli
          curl -L -o $(pwd)/cli/decky "https://github.com/SteamDeckHomebrew/cli/releases/latest/download/decky-linux-x86_64"
          chmod +x $(pwd)/cli/decky

      - name: Build plugin
        run: |
          $(pwd)/cli/decky plugin build $(pwd)
          unzip "out/RetroDECKY.zip" -d "out/RetroDECKY"

      - name: Show files
        run: |
          ls out/RetroDECKY.zip
          7z l out/RetroDECKY.zip

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RetroDECKY
          path: out/RetroDECKY.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build_plugin
    steps:
      - run: mkdir /tmp/artifacts

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - run: ls -R /tmp/artifacts

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/artifacts/RetroDECKY/RetroDECKY.zip
          tag_name: ${{ github.ref_name }}
          body: |
            RetroDECKY
          draft: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
